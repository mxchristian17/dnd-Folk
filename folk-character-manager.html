<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Folk · Bard of the College of Valor</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0c0a07;--panel:#16110c;--card:#1e1710;--card2:#251e14;
  --border:#3a2c1c;--border2:#7a5228;
  --copper:#c17f3a;--gold:#d4a040;--goldbr:#f0c060;
  --txt:#e8d4a8;--txt2:#a89070;--txt3:#6a5840;
  --hp-ok:#3d8a50;--hp-warn:#b07a10;--hp-crit:#c04040;
  --magic:#6040a0;--danger:#c04040;--success:#4a9a60;--warn:#b07a10;
  --r:6px;--rmd:10px;--rlg:14px;
  --shadow:0 4px 24px rgba(0,0,0,.7);--glow:0 0 14px rgba(193,127,58,.25);
  --header-h:52px;--banner-h:0px;--nav-h:58px;
}
html{height:100%;scroll-behavior:smooth}
body{min-height:100%;background:var(--bg);color:var(--txt);font-family:'Crimson Pro',Georgia,serif;font-size:16px;line-height:1.4;overflow-x:hidden;padding-top:calc(var(--header-h) + var(--banner-h));padding-bottom:calc(var(--nav-h) + 4px);background-image:radial-gradient(ellipse at 15% 40%,rgba(60,40,20,.12) 0%,transparent 55%),radial-gradient(ellipse at 85% 10%,rgba(40,30,60,.1) 0%,transparent 50%)}
h1,h2,h3,h4,.cinzel{font-family:'Cinzel','Times New Roman',serif;letter-spacing:.04em}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ─── HEADER ─────────────────────────── */
#app-header{position:fixed;top:0;left:0;right:0;height:var(--header-h);z-index:200;background:linear-gradient(180deg,var(--panel) 0%,rgba(22,17,12,.97) 100%);border-bottom:1px solid var(--border2);display:flex;align-items:center;padding:0 10px;gap:8px;box-shadow:0 2px 20px rgba(0,0,0,.8);backdrop-filter:blur(4px)}
#folk-title{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--gold);letter-spacing:.14em;white-space:nowrap;text-shadow:0 0 10px rgba(212,160,64,.4)}
.header-stats{display:flex;gap:4px;flex:1;justify-content:flex-end;overflow:hidden}
.hstat{display:flex;flex-direction:column;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:2px 5px;min-width:38px;cursor:pointer;transition:border-color .2s}
.hstat:hover{border-color:var(--border2)}
.hstat-lbl{font-size:8px;color:var(--txt3);letter-spacing:.08em;text-transform:uppercase;font-family:'Cinzel',serif}
.hstat-val{font-size:14px;font-weight:700;color:var(--txt);font-family:'Cinzel',serif;line-height:1.2}
.hstat-val.ok{color:var(--success)}.hstat-val.warn{color:var(--warn)}.hstat-val.crit{color:var(--danger);animation:pcrit 1s infinite}
@keyframes pcrit{0%,100%{opacity:1}50%{opacity:.45}}

/* ─── CONDITION BANNER ───────────────── */
#cond-banner{position:fixed;top:var(--header-h);left:0;right:0;z-index:190;display:none;flex-direction:column;border-bottom:1px solid rgba(192,64,64,.35);box-shadow:0 3px 12px rgba(0,0,0,.5)}
#cond-banner.active{display:flex}
.cb-main{display:flex;align-items:center;gap:6px;padding:5px 10px;overflow-x:auto;scrollbar-width:none;background:linear-gradient(90deg,rgba(192,40,40,.18) 0%,rgba(22,17,12,.97) 100%);min-height:30px}
.cb-main::-webkit-scrollbar{display:none}
.cb-lbl{font-family:'Cinzel',serif;font-size:9px;color:var(--txt3);letter-spacing:.1em;white-space:nowrap;flex-shrink:0}
.cb-pill{flex-shrink:0;font-family:'Cinzel',serif;font-size:9px;padding:2px 8px;border-radius:100px;white-space:nowrap;letter-spacing:.05em}
.cb-pill.bad{background:rgba(192,64,64,.22);border:1px solid rgba(192,64,64,.5);color:#f08888}
.cb-pill.warn{background:rgba(180,120,0,.18);border:1px solid rgba(180,120,0,.4);color:#d4a040}
.cb-pill.spd{background:rgba(32,96,192,.18);border:1px solid rgba(32,96,192,.4);color:#70a0e0}
.cb-pill.good{background:rgba(64,160,80,.15);border:1px solid rgba(64,160,80,.4);color:#70d090}
.cb-sep{flex-shrink:0;color:var(--txt3);font-size:10px}

/* ─── BOTTOM NAV ─────────────────────── */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);z-index:200;background:var(--panel);border-top:1px solid var(--border2);display:flex;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;box-shadow:0 -2px 20px rgba(0,0,0,.6)}
#bottom-nav::-webkit-scrollbar{display:none}
.ntab{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-width:60px;padding:6px 10px 8px;cursor:pointer;border:none;background:transparent;color:var(--txt3);font-family:'Cinzel',serif;font-size:9px;letter-spacing:.05em;transition:color .2s,background .2s;border-top:2px solid transparent;user-select:none}
.ntab:hover{color:var(--txt2)}.ntab.active{color:var(--gold);border-top-color:var(--gold);background:rgba(212,160,64,.06)}
.ntab-icon{font-size:18px;line-height:1}.ntab-lbl{white-space:nowrap}

/* ─── SECTIONS ───────────────────────── */
.section{display:none;padding:14px 12px}.section.active{display:block}

/* ─── CARDS ──────────────────────────── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--rmd);padding:14px;margin-bottom:12px;box-shadow:var(--shadow);position:relative}
.card.acc{border-color:var(--border2)}.card.glow{box-shadow:var(--shadow),var(--glow)}.card.magic{border-color:var(--magic);background:linear-gradient(135deg,var(--card) 0%,#181028 100%)}
.card.danger{border-color:var(--danger)}.card.gold-border{border-color:rgba(212,160,64,.35)}.card.dance{border-color:#4080e0;background:linear-gradient(135deg,var(--card) 0%,#0e1a2e 100%)}

.sec-title{display:flex;align-items:center;gap:10px;margin-bottom:16px;font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:.15em;color:var(--txt3);text-transform:uppercase}
.sec-title::before,.sec-title::after{content:'';flex:1;height:1px}
.sec-title::before{background:linear-gradient(to left,var(--border2),transparent)}
.sec-title::after{background:linear-gradient(to right,var(--border2),transparent)}
.ctitle{font-family:'Cinzel',serif;font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--txt3);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ctitle::after{content:'';flex:1;height:1px;background:var(--border)}

/* ─── CONDITION EFFECTS INLINE ───────── */
.cond-effects-box{background:rgba(192,40,40,.1);border:1px solid rgba(192,64,64,.3);border-radius:var(--r);padding:10px 12px;margin-bottom:12px}
.cond-effects-title{font-family:'Cinzel',serif;font-size:9px;color:var(--danger);letter-spacing:.1em;margin-bottom:6px}
.cond-fx-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(192,64,64,.15);font-size:13px}
.cond-fx-row:last-child{border-bottom:none}
.cond-fx-icon{font-size:14px;flex-shrink:0;width:20px;text-align:center}
.cond-fx-text{flex:1;color:var(--txt2)}
.cond-fx-badge{font-family:'Cinzel',serif;font-size:9px;padding:2px 7px;border-radius:100px;flex-shrink:0}
.cond-fx-badge.disadv{background:rgba(192,64,64,.25);border:1px solid rgba(192,64,64,.5);color:#f08080}
.cond-fx-badge.adv{background:rgba(64,192,80,.2);border:1px solid rgba(64,192,80,.4);color:#70d090}
.cond-fx-badge.auto{background:rgba(180,120,0,.2);border:1px solid rgba(180,120,0,.4);color:#d4a040}
.cond-fx-badge.zero{background:rgba(32,96,192,.2);border:1px solid rgba(32,96,192,.4);color:#70a0e0}

/* ─── DISADV WARNING BADGE ───────────── */
.disadv-warning{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--r);background:rgba(192,64,64,.15);border:1px solid rgba(192,64,64,.4);color:#f08080;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.07em;margin-bottom:8px}
.adv-note{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--r);background:rgba(64,192,80,.12);border:1px solid rgba(64,192,80,.35);color:#70d090;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.07em;margin-bottom:8px}

/* ─── HP BAR ─────────────────────────── */
.hp-wrap{background:rgba(0,0,0,.4);border-radius:100px;height:10px;overflow:hidden;margin:8px 0}
.hp-bar{height:100%;border-radius:100px;transition:width .5s ease,background .5s ease}

/* ─── BUTTONS ────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--r);border:1px solid var(--border2);background:var(--card2);color:var(--txt);font-family:'Cinzel',serif;font-size:11px;font-weight:600;letter-spacing:.07em;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none;-webkit-user-select:none}
.btn:hover{background:var(--border2)}.btn:active{transform:scale(.97)}
.btn.pri{border-color:var(--copper);background:rgba(193,127,58,.12);color:var(--copper)}.btn.pri:hover{background:rgba(193,127,58,.28)}
.btn.dan{border-color:var(--danger);background:rgba(192,64,64,.1);color:var(--danger)}.btn.dan:hover{background:rgba(192,64,64,.24)}
.btn.suc{border-color:var(--success);background:rgba(74,154,96,.1);color:var(--success)}.btn.suc:hover{background:rgba(74,154,96,.24)}
.btn.mag{border-color:var(--magic);background:rgba(96,64,160,.1);color:#b090f0}.btn.mag:hover{background:rgba(96,64,160,.24)}
.btn.gld{border-color:var(--gold);background:rgba(212,160,64,.1);color:var(--gold)}.btn.gld:hover{background:rgba(212,160,64,.24)}
.btn.blue{border-color:#4080e0;background:rgba(64,128,224,.12);color:#80b0f0}.btn.blue:hover{background:rgba(64,128,224,.28)}
.btn.full{width:100%}.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}.f1{flex:1}

.adj{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ab{flex:1;min-width:44px;padding:11px 6px;border:1px solid var(--border2);border-radius:var(--r);background:var(--card2);color:var(--txt);font-family:'Cinzel',serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;user-select:none;-webkit-user-select:none}
.ab:hover,.ab:active{background:var(--border2);transform:scale(.97)}
.ab.d{border-color:var(--danger);color:var(--danger)}.ab.d:hover{background:rgba(192,64,64,.2)}
.ab.h{border-color:var(--success);color:var(--success)}.ab.h:hover{background:rgba(74,154,96,.2)}
.ab.w{flex:2}

/* ─── INPUTS ─────────────────────────── */
input,textarea,select{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);color:var(--txt);font-family:'Crimson Pro',Georgia,serif;font-size:15px;padding:8px 12px;outline:none;width:100%;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--copper);box-shadow:0 0 0 2px rgba(193,127,58,.2)}
textarea{resize:vertical;min-height:100px}
select option{background:var(--card2)}

/* ─── DANCING SWORD WIDGET ───────────── */
.sword-status{display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--r);margin-bottom:12px}
.sword-status.grounded{background:rgba(58,44,28,.3);border:1px solid var(--border2)}
.sword-status.hovering{background:rgba(32,80,224,.12);border:1px solid rgba(64,128,224,.5);animation:sword-glow 2.5s ease-in-out infinite}
@keyframes sword-glow{0%,100%{box-shadow:0 0 8px rgba(64,128,224,.2)}50%{box-shadow:0 0 20px rgba(64,128,224,.4),0 0 40px rgba(64,128,224,.15)}}
.sword-icon-big{font-size:36px;filter:drop-shadow(0 0 6px rgba(64,128,224,.5))}
.sword-atk-pips{display:flex;gap:8px;margin:8px 0}
.sword-pip{width:28px;height:28px;border-radius:50%;border:2px solid #4080e0;background:transparent;display:inline-flex;align-items:center;justify-content:center;font-size:12px;transition:all .3s}
.sword-pip.used{background:#4080e0;box-shadow:0 0 8px #4080e0}.sword-pip.used::after{content:'✦';color:#fff;font-size:10px}
.sword-pip-lbl{font-family:'Cinzel',serif;font-size:9px;color:var(--txt3);letter-spacing:.1em;margin-bottom:4px}

/* ─── STAT BOXES ─────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-box{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:10px 8px;text-align:center;transition:border-color .2s}
.stat-box:hover{border-color:var(--border2)}
.stat-name{font-family:'Cinzel',serif;font-size:9px;color:var(--txt3);letter-spacing:.1em}
.stat-score{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--txt);line-height:1.2}
.stat-mod{font-size:14px;color:var(--gold);font-weight:600;margin-top:2px}

/* ─── SKILL ROWS ─────────────────────── */
.skill-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(58,44,28,.5);font-size:14px}
.skill-row:last-child{border-bottom:none}
.pip{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--txt3);flex-shrink:0}
.pip.prof{background:var(--copper);border-color:var(--copper)}.pip.expert{background:var(--gold);border-color:var(--gold);box-shadow:0 0 5px rgba(212,160,64,.5)}
.sk-name{flex:1;color:var(--txt2)}.sk-ab{font-size:11px;color:var(--txt3);font-family:'Cinzel',serif}.sk-bon{font-family:'Cinzel',serif;font-weight:700;min-width:28px;text-align:right}

/* ─── SPELL SLOTS ────────────────────── */
.slot-pip{width:32px;height:32px;border-radius:50%;border:2px solid var(--magic);background:transparent;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;font-size:12px}
.slot-pip.used{background:rgba(96,64,160,.25);opacity:.5}.slot-pip.used::after{content:'✦';color:var(--txt3)}
.slot-pip:not(.used):hover{background:rgba(96,64,160,.3);box-shadow:0 0 8px var(--magic)}
.slots-lbl{font-family:'Cinzel',serif;font-size:10px;color:var(--txt3);letter-spacing:.1em;margin-bottom:6px}
.slots-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}

/* ─── SPELL CARDS ────────────────────── */
.spell-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rmd);padding:12px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.spell-card:hover{border-color:var(--border2)}.spell-card.conc-card{border-color:rgba(32,80,160,.5)}.spell-card.cantrip-card{border-color:rgba(96,64,160,.4)}
.spell-name{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--txt)}
.spell-badge{font-family:'Cinzel',serif;font-size:9px;padding:2px 7px;border-radius:100px;white-space:nowrap;flex-shrink:0}
.badge-0{background:rgba(96,64,160,.3);color:#b090f0;border:1px solid rgba(96,64,160,.5)}
.badge-1{background:rgba(58,150,90,.2);color:#60c080;border:1px solid rgba(58,150,90,.4)}
.badge-2{background:rgba(60,100,200,.2);color:#70a0f0;border:1px solid rgba(60,100,200,.4)}
.badge-3{background:rgba(180,100,20,.2);color:#d08040;border:1px solid rgba(180,100,20,.4)}
.badge-4{background:rgba(180,40,40,.2);color:#d06060;border:1px solid rgba(180,40,40,.4)}
.spell-meta{display:flex;gap:5px;flex-wrap:wrap;margin:6px 0}
.stag{font-size:11px;color:var(--txt3);background:var(--card2);border-radius:3px;padding:1px 5px}
.spell-desc{font-size:14px;color:var(--txt2);line-height:1.55;display:none;margin-top:8px}
.spell-card.open .spell-desc{display:block}
.conc-badge{font-size:11px;padding:2px 8px;border-radius:3px;background:rgba(32,80,160,.25);color:#70a0e0;border:1px solid rgba(32,80,160,.4);display:inline-flex;align-items:center;gap:4px}
.cast-btn{padding:5px 13px;border-radius:var(--r);border:1px solid var(--magic);background:rgba(96,64,160,.18);color:#b090f0;font-family:'Cinzel',serif;font-size:10px;cursor:pointer;transition:all .2s;margin-right:4px;margin-top:6px}
.cast-btn:hover{background:rgba(96,64,160,.38)}.cast-actions{margin-top:8px}

/* ─── BI PIPS ────────────────────────── */
.bi-pip{width:36px;height:36px;border-radius:50%;border:2px solid var(--copper);background:transparent;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center}
.bi-pip.on{background:var(--copper)}.bi-pip.on::before{content:'♪';color:var(--bg)}
.bi-pip:not(.on):hover{background:rgba(193,127,58,.2)}
.bi-pips{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}

/* ─── ACTION TOKENS ──────────────────── */
.act-token{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 8px;background:var(--card2);border:2px solid var(--border);border-radius:var(--rmd);cursor:pointer;transition:all .2s}
.act-token.used{opacity:.4;border-style:dashed}.act-token:not(.used):hover{border-color:var(--copper)}
.act-icon{font-size:22px}.act-name{font-family:'Cinzel',serif;font-size:8px;color:var(--txt3);letter-spacing:.08em}.act-state{font-size:11px;color:var(--txt3)}

/* ─── DEATH SAVES ────────────────────── */
.ds-pip{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid var(--border);transition:all .2s;display:inline-flex;align-items:center;justify-content:center}
.ds-pip.succ{border-color:var(--success)}.ds-pip.succ.on{background:var(--success)}
.ds-pip.fail{border-color:var(--danger)}.ds-pip.fail.on{background:var(--danger)}

/* ─── CONCENTRATION ──────────────────── */
.conc-wrap{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r);background:rgba(32,80,160,.12);border:1px solid rgba(32,80,160,.35);cursor:pointer}
.conc-dot{width:10px;height:10px;border-radius:50%;background:#4080c0;box-shadow:0 0 8px #4080c0;flex-shrink:0;animation:pconc 2s infinite}
@keyframes pconc{0%,100%{box-shadow:0 0 8px #4080c0}50%{box-shadow:0 0 18px #4080c0,0 0 28px rgba(64,128,192,.35)}}
.conc-text{font-family:'Cinzel',serif;font-size:12px;color:#70a0e0;flex:1}

/* ─── FILTER BAR ─────────────────────── */
.fbar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.fbar::-webkit-scrollbar{display:none}
.fchip{flex-shrink:0;padding:5px 12px;border-radius:100px;border:1px solid var(--border);background:var(--card2);color:var(--txt3);font-family:'Cinzel',serif;font-size:10px;letter-spacing:.05em;cursor:pointer;transition:all .15s}
.fchip.on{border-color:var(--magic);background:rgba(96,64,160,.2);color:#b090f0}.fchip:hover:not(.on){border-color:var(--border2)}

/* ─── CONDITION CHIPS ────────────────── */
.cond-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:13px;cursor:pointer;transition:all .2s;margin:3px}
.cond-chip.on{background:rgba(192,64,64,.18);border:1px solid var(--danger);color:var(--danger)}
.cond-chip.off{background:var(--card2);border:1px solid var(--border);color:var(--txt2)}.cond-chip.off:hover{border-color:var(--border2)}

/* ─── VARA CARD ──────────────────────── */
.vara-hero{text-align:center;padding:22px 16px;background:linear-gradient(135deg,#1a1228 0%,#0c0a07 50%,#1a1208 100%);border-radius:var(--rmd);border:1px solid var(--border2);margin-bottom:12px;position:relative;overflow:hidden}
.vara-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(193,127,58,.1) 0%,transparent 60%)}
.vara-name{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--gold);text-shadow:0 0 18px rgba(212,160,64,.4);margin-bottom:4px}
.vara-sub{font-size:13px;color:var(--txt3);font-style:italic;letter-spacing:.06em}
.vara-icon{font-size:52px;margin-bottom:10px;position:relative;z-index:1}
.vara-eff{background:var(--card2);border:1px solid var(--border);border-left:3px solid var(--copper);border-radius:0 var(--r) var(--r) 0;padding:10px 12px;margin-bottom:8px}
.vara-eff-name{font-family:'Cinzel',serif;font-size:10px;color:var(--copper);letter-spacing:.1em;margin-bottom:4px}
.vara-eff-desc{font-size:14px;color:var(--txt2)}

/* ─── FEATURE & ITEM CARDS ───────────── */

.roll-btn{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:10px;cursor:pointer;transition:all .15s;text-align:left;position:relative}
.roll-btn:hover{border-color:var(--border2);background:var(--border)}.roll-btn:active{transform:scale(.97)}
.rb-name{font-family:'Cinzel',serif;font-size:11px;color:var(--txt);display:block}

.rb-badge.dis{background:rgba(192,64,64,.25);border:1px solid rgba(192,64,64,.5);color:#f08080}
.rb-badge.adv{background:rgba(64,192,80,.2);border:1px solid rgba(64,192,80,.4);color:#70d090}

/* ─── NOTES ──────────────────────────── */
.note-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;scrollbar-width:none}
.note-tabs::-webkit-scrollbar{display:none}
.note-tab{flex-shrink:0;padding:5px 13px;border-radius:100px;border:1px solid var(--border);background:var(--card2);color:var(--txt3);font-family:'Cinzel',serif;font-size:9px;letter-spacing:.06em;cursor:pointer;transition:all .15s}
.note-tab.on{border-color:var(--copper);background:rgba(193,127,58,.1);color:var(--copper)}

/* ─── GOLD ───────────────────────────── */
.gold-box{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:10px 8px;text-align:center}
.gold-val{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--gold);display:block}
.gold-name2{font-size:11px;color:var(--txt3)}

/* ─── MODALS ─────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:var(--rlg) var(--rlg) 0 0;padding:20px 16px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;animation:slide-up .3s ease}
@keyframes slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);margin-bottom:16px;text-align:center}

/* ─── TOAST ──────────────────────────── */
#toast{position:fixed;bottom:calc(var(--nav-h) + 14px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--card);border:1px solid var(--border2);border-radius:var(--rlg);padding:9px 18px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.07em;color:var(--txt);z-index:500;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── MISC ───────────────────────────── */
.row{display:flex;gap:8px;align-items:center}.jb{justify-content:space-between}.fw{flex-wrap:wrap}
.divider{height:1px;background:var(--border);margin:12px 0}
.tc{text-align:center}.ts{font-size:13px}.txs{font-size:11px}
.muted{color:var(--txt3)}.c2{color:var(--txt2)}.copper{color:var(--copper)}.gold{color:var(--gold)}.magic-c{color:#b090f0}.danger-c{color:var(--danger)}.success-c{color:var(--success)}
.ital{font-style:italic}.bold{font-weight:600}

</style>
</head>

<script>
/* ══════════════════════════════════════════
   FOLK — DND 2024 CHARACTER MANAGER v3.0
   Bard of the College of Valor · Level 8
   + Dancing Sword · Condition Effects
   ══════════════════════════════════════════ */

// ─── STATIC DATA ──────────────────────
const CHAR={name:'Folk',title:'Bard of the College of Valor',race:'Human',level:8,cls:'Bard',sub:'College of Valor',bg:'Criminal',prof:3,maxHP:59,AC:18,DC:16,atkBonus:8,ini:2,baseSpeed:30,hitDie:8,
  scores:{STR:8,DEX:15,CON:14,INT:10,WIS:10,CHA:19},
  savingThrows:{STR:false,DEX:true,CON:false,INT:false,WIS:false,CHA:true},
  skills:{'Acrobatics':{ab:'DEX',p:false,e:false},'Arcana':{ab:'INT',p:false,e:false},'Athletics':{ab:'STR',p:true,e:false},'Deception':{ab:'CHA',p:true,e:true},'History':{ab:'INT',p:false,e:false},'Insight':{ab:'WIS',p:false,e:false},'Intimidation':{ab:'CHA',p:false,e:false},'Investigation':{ab:'INT',p:false,e:false},'Sleight of Hand':{ab:'DEX',p:true,e:false},'Medicine':{ab:'WIS',p:false,e:false},'Nature':{ab:'INT',p:false,e:false},'Perception':{ab:'WIS',p:true,e:true},'Performance':{ab:'CHA',p:true,e:true},'Persuasion':{ab:'CHA',p:true,e:true},'Religion':{ab:'INT',p:false,e:false},'Stealth':{ab:'DEX',p:true,e:false},'Survival':{ab:'WIS',p:false,e:false},'Animal Handling':{ab:'WIS',p:false,e:false}},
  equipment:[{icon:'🛡️',name:'Breastplate',desc:'Base AC 14 + DEX (max +2)'},{icon:'🛡️',name:'Shield',desc:'+2 AC'},{icon:'🪄',name:'Vara del Juglar',desc:'Arcane focus · Rare magic item · Attuned',magic:true},{icon:'🎵',name:'Harmonica',desc:'Bardic instrument — worn around the neck'}],
  weapons:[{name:'Dagger',atk:5,dmg:'1d4+2 piercing',notes:'Light · Finesse · Thrown'},{name:'Short Sword',atk:5,dmg:'1d6+2 piercing',notes:'Light · Finesse'}]
};

function abilMod(s){return Math.floor((s-10)/2)}
function fmtMod(n){return(n>=0?'+':'')+n}
function skillVal(sk){const s=CHAR.skills[sk];if(!s)return 0;const b=abilMod(CHAR.scores[s.ab]);if(s.e)return b+CHAR.prof*2;if(s.p)return b+CHAR.prof;return b+Math.floor(CHAR.prof/2)}
function saveVal(ab){return abilMod(CHAR.scores[ab])+(CHAR.savingThrows[ab]?CHAR.prof:0)}

// ─── CONDITION EFFECTS ENGINE ─────────
const CONDITIONS_DB={
  'Blinded':{icon:'🌑',color:'#888',desc:"Can't see. Your attack rolls have DISADVANTAGE. Attacks against you have ADVANTAGE.",
    effects:[{on:'your_attacks',type:'disadv',text:'DISADV on your attacks'},{on:'attacks_vs_you',type:'adv',text:'ADV on attacks vs you'}]},
  'Charmed':{icon:'💫',color:'#c080e0',desc:"Can't attack the charmer. Charmer has ADV on CHA checks against you.",
    effects:[{on:'roleplay',type:'warn',text:"Can't attack charmer"}]},
  'Deafened':{icon:'🔇',color:'#888',desc:"Can't hear. Auto-fail checks requiring hearing.",
    effects:[{on:'checks',type:'warn',text:'Auto-fail hearing checks'}]},
  'Exhausted':{icon:'😫',color:'#c0802c',desc:'See exhaustion level tracker.',effects:[]},
  'Frightened':{icon:'😱',color:'#c04040',desc:'DISADV on attacks & checks while source in sight. Cannot move closer to source.',
    effects:[{on:'your_attacks',type:'disadv',text:'DISADV attacks & checks (source visible)'},{on:'movement',type:'warn',text:"Can't move toward source"}]},
  'Grappled':{icon:'🤜',color:'#808040',desc:'Speed is 0.',
    effects:[{on:'speed',type:'zero',text:'Speed 0'}]},
  'Incapacitated':{icon:'😶',color:'#888',desc:"Can't take actions or reactions.",
    effects:[{on:'actions',type:'zero',text:'No actions or reactions'}]},
  'Invisible':{icon:'👻',color:'#80c0ff',desc:"Can't be seen. Your attack rolls have ADVANTAGE. Attacks vs you have DISADVANTAGE.",
    effects:[{on:'your_attacks',type:'adv',text:'ADV on your attacks'},{on:'attacks_vs_you',type:'disadv',text:'DISADV on attacks vs you'}]},
  'Paralyzed':{icon:'⚡',color:'#c0c040',desc:'Incapacitated. Speed 0. Auto-fail STR & DEX saves. Attacks vs you have ADV. Melee hits within 5 ft are crits.',
    effects:[{on:'speed',type:'zero',text:'Speed 0'},{on:'saves',type:'zero',text:'Auto-fail STR & DEX saves'},{on:'attacks_vs_you',type:'adv',text:'ADV on attacks vs you + crits in 5 ft'},{on:'actions',type:'zero',text:'Incapacitated'}]},
  'Petrified':{icon:'🗿',color:'#a0a0a0',desc:'Stone. Incapacitated. Speed 0. Resistance all damage.',
    effects:[{on:'speed',type:'zero',text:'Speed 0'},{on:'actions',type:'zero',text:'Incapacitated'},{on:'defense',type:'adv',text:'Resistance to all damage'}]},
  'Poisoned':{icon:'☠️',color:'#40c040',desc:'DISADV on attack rolls and ability checks.',
    effects:[{on:'your_attacks',type:'disadv',text:'DISADV on attacks & ability checks'}]},
  'Prone':{icon:'🔽',color:'#a08040',desc:'Crawling only (half speed). Melee attacks vs you have ADV. Ranged attacks vs you have DISADV. Your attacks have DISADV.',
    effects:[{on:'speed',type:'disadv',text:'Crawl only (½ speed)'},{on:'your_attacks',type:'disadv',text:'DISADV on your attacks'},{on:'attacks_vs_you',type:'warn',text:'Melee ADV · Ranged DISADV vs you'}]},
  'Restrained':{icon:'⛓️',color:'#c08040',desc:'Speed 0. Attacks vs you ADV. Your attacks DISADV. DEX saves DISADV.',
    effects:[{on:'speed',type:'zero',text:'Speed 0'},{on:'your_attacks',type:'disadv',text:'DISADV on your attacks'},{on:'attacks_vs_you',type:'adv',text:'ADV on attacks vs you'},{on:'saves',type:'disadv',text:'DISADV on DEX saves'}]},
  'Stunned':{icon:'💥',color:'#c0a040',desc:'Incapacitated. Cannot move. Auto-fail STR & DEX saves. Attacks vs you have ADV.',
    effects:[{on:'speed',type:'zero',text:'Speed 0'},{on:'actions',type:'zero',text:'Incapacitated'},{on:'saves',type:'zero',text:'Auto-fail STR & DEX saves'},{on:'attacks_vs_you',type:'adv',text:'ADV on attacks vs you'}]},
  'Unconscious':{icon:'💤',color:'#6060a0',desc:'Incapacitated. Speed 0. Auto-fail STR & DEX saves. Attacks ADV. Melee crits within 5 ft. You are Prone.',
    effects:[{on:'speed',type:'zero',text:'Speed 0'},{on:'actions',type:'zero',text:'Incapacitated'},{on:'saves',type:'zero',text:'Auto-fail STR & DEX saves'},{on:'attacks_vs_you',type:'adv',text:'ADV + crits in 5 ft vs you'}]},
};

const EXHAUST_DESC=['No exhaustion','Disadvantage on ability checks','Speed halved','Disadv. on attacks & saves','Max HP halved','Speed reduced to 5 ft','💀 Dead'];

// ─── COMPUTED CONDITION EFFECTS ───────
function effectiveSpeed(){
  const c=S.conds;
  if(c.includes('Grappled')||c.includes('Restrained')||c.includes('Paralyzed')||c.includes('Stunned')||c.includes('Unconscious'))return 0;
  let spd=CHAR.baseSpeed;
  if(c.includes('Prone'))spd=Math.floor(spd/2);
  if(S.exhaustion>=5)return 5;
  if(S.exhaustion>=2)spd=Math.floor(spd/2);
  return spd;
}
function hasAttackDisadv(){
  return S.conds.some(c=>['Blinded','Prone','Poisoned','Frightened','Restrained'].includes(c))||S.exhaustion>=3;
}
function hasAttackAdv(){return S.conds.includes('Invisible')}
function attacksVsYouAdv(){return S.conds.some(c=>['Blinded','Prone','Restrained','Paralyzed','Stunned','Unconscious'].includes(c))}
function isIncapacitated(){return S.conds.some(c=>['Incapacitated','Paralyzed','Petrified','Stunned','Unconscious'].includes(c))}
function autoFailSaves(){
  const c=S.conds;
  const str=c.some(x=>['Paralyzed','Stunned','Unconscious'].includes(x));
  const dex=c.some(x=>['Paralyzed','Restrained','Stunned','Unconscious'].includes(x));
  return{str,dex};
}

function getCondEffects(){
  const fx=[];const c=S.conds;
  const spd=effectiveSpeed();
  if(spd!==CHAR.baseSpeed){
    const z=spd===0;
    fx.push({cls:z?'bad':'warn',text:`🏃 Speed: ${spd} ft${z?' (ZERO!)':''}`});
  }
  c.forEach(name=>{
    const cd=CONDITIONS_DB[name];
    if(!cd)return;
    cd.effects.forEach(e=>{
      fx.push({cls:e.type==='disadv'?'bad':e.type==='adv'?'good':e.type==='zero'?'spd':'warn',text:`${cd.icon} ${name}: ${e.text}`});
    });
  });
  if(S.exhaustion>0)fx.push({cls:S.exhaustion>=3?'bad':'warn',text:`😫 Exhaustion ${S.exhaustion}: ${EXHAUST_DESC[S.exhaustion]}`});
  if(hasAttackAdv())fx.push({cls:'good',text:'🎯 ADV on your attacks (Invisible)'});
  return fx;
}

function updateCondBanner(){
  const banner=document.getElementById('cond-banner');
  const inner=document.getElementById('cb-inner');
  const hdrSpd=document.getElementById('hdr-spd');
  if(!banner||!inner)return;
  const fx=getCondEffects();
  const spd=effectiveSpeed();
  if(hdrSpd){
    hdrSpd.textContent=spd+'ft';
    hdrSpd.style.color=spd===0?'var(--danger)':spd<CHAR.baseSpeed?'var(--warn)':'';
  }
  if(fx.length===0){
    banner.classList.remove('active');
    inner.innerHTML='';
    document.documentElement.style.setProperty('--banner-h','0px');
  }else{
    inner.innerHTML='<span class="cb-lbl">⚠ ACTIVE:</span>'+fx.map(f=>`<span class="cb-pill ${f.cls}">${f.text}</span>`).join('');
    banner.classList.add('active');
    requestAnimationFrame(()=>{
      const h=banner.offsetHeight;
      document.documentElement.style.setProperty('--banner-h',h+'px');
    });
  }
}

function condEffectsBoxHTML(){
  const fx=getCondEffects();if(fx.length===0)return'';
  const rows=[];
  const c=S.conds;
  if(isIncapacitated())rows.push({icon:'😶',text:'Incapacitated — no actions or reactions',badge:'INCAP',cls:'auto'});
  if(hasAttackDisadv())rows.push({icon:'🎯',text:'Your attack rolls',badge:'DISADVANTAGE',cls:'disadv'});
  if(hasAttackAdv())rows.push({icon:'🎯',text:'Your attack rolls',badge:'ADVANTAGE',cls:'adv'});
  if(attacksVsYouAdv())rows.push({icon:'🛡️',text:'Attacks against you',badge:'ADVANTAGE',cls:'adv'});
  const {str,dex}=autoFailSaves();
  if(str)rows.push({icon:'💀',text:'STR saving throws',badge:'AUTO-FAIL',cls:'auto'});
  if(dex)rows.push({icon:'💀',text:'DEX saving throws',badge:'AUTO-FAIL',cls:'auto'});
  const spd=effectiveSpeed();
  if(spd!==CHAR.baseSpeed)rows.push({icon:'🏃',text:`Movement speed: ${spd} ft${spd===0?' — CANNOT MOVE':''}`,badge:spd===0?'ZERO':'HALVED',cls:spd===0?'auto':'disadv'});
  if(c.includes('Prone'))rows.push({icon:'🔽',text:'Melee attacks against you: ADV · Ranged vs you: DISADV',badge:'PRONE',cls:'disadv'});
  if(S.exhaustion>=1)rows.push({icon:'😫',text:`Exhaustion ${S.exhaustion}: ${EXHAUST_DESC[S.exhaustion]}`,badge:'EXHAUSTED',cls:S.exhaustion>=3?'auto':'disadv'});
  if(rows.length===0)return'';
  return`<div class="cond-effects-box">
    <div class="cond-effects-title">⚠ ACTIVE CONDITION EFFECTS</div>
    ${rows.map(r=>`<div class="cond-fx-row"><span class="cond-fx-icon">${r.icon}</span><span class="cond-fx-text">${r.text}</span><span class="cond-fx-badge ${r.cls}">${r.badge}</span></div>`).join('')}
  </div>`;
}

// ─── BARD FEATURES ────────────────────
const BARD_FEATS=[
  {name:'Bardic Inspiration',lv:1,desc:'Bonus Action: grant a d8 die to a creature within 60 ft. It adds it to an attack, check, or save within 1 hour. 4 uses/rest.'},

function diceRoll(count,sides,mod,label){
  const rolls=Array.from({length:count},()=>Math.floor(Math.random()*sides)+1);
  const total=rolls.reduce((a,b)=>a+b,0)+(mod||0);
  const ms=mod?(mod>0?` + ${mod}`:` - ${Math.abs(mod)}`): '';
  const r={label:label||`${count}d${sides}${mod?fmtMod(mod):''}`,total,bd:rolls.join(' + ')+ms,rolls};
  S.diceLog.unshift(r);if(S.diceLog.length>15)S.diceLog.pop();save();
  if(curSec==='dice')renderSection('dice');return r;
}
function rollD20(mod,label,adv){
  const r1=Math.floor(Math.random()*20)+1;const ms=mod?(mod>0?` + ${mod}`:` - ${Math.abs(mod)}`): '';
  if(adv==='adv'){const r2=Math.floor(Math.random()*20)+1;const best=Math.max(r1,r2);const total=best+(mod||0);const r={label:`${label} (Advantage)`,total,bd:`(${r1}, ${r2}) → ${best}${ms}`,rolls:[r1,r2]};S.diceLog.unshift(r);if(S.diceLog.length>15)S.diceLog.pop();save();if(curSec==='dice')renderSection('dice');return r;}
  if(adv==='dis'){const r2=Math.floor(Math.random()*20)+1;const worst=Math.min(r1,r2);const total=worst+(mod||0);const r={label:`${label} (Disadvantage)`,total,bd:`(${r1}, ${r2}) → ${worst}${ms}`,rolls:[r1,r2]};S.diceLog.unshift(r);if(S.diceLog.length>15)S.diceLog.pop();save();if(curSec==='dice')renderSection('dice');return r;}
  const total=r1+(mod||0);const r={label:label||`d20${mod?fmtMod(mod):''}`,total,bd:`${r1}${ms}`,rolls:[r1]};
  S.diceLog.unshift(r);if(S.diceLog.length>15)S.diceLog.pop();save();if(curSec==='dice')renderSection('dice');return r;
}
function qRoll(mod,label){
  const adv=hasAttackDisadv()&&!hasAttackAdv()?'dis':hasAttackAdv()&&!hasAttackDisadv()?'adv':advMode==='normal'?undefined:advMode;
  rollD20(mod,label,adv);
}
function qRollFree(mod,label){rollD20(mod,label,advMode==='normal'?undefined:advMode)}

  const crit=r.rolls&&r.rolls.length===1&&r.rolls[0]===20;const fumble=r.rolls&&r.rolls.length===1&&r.rolls[0]===1;
  return`<div class="dice-label2">${r.label}</div>

    ${crit?'<div class="gold cinzel" style="font-size:12px;margin-top:6px;letter-spacing:.12em">✦ CRITICAL HIT ✦</div>':''}
    ${fumble?'<div class="danger-c cinzel" style="font-size:12px;margin-top:6px;letter-spacing:.12em">☠ CRITICAL FAIL ☠</div>':''}`;

function castSpell(name,lv){
  if(lv===0){toast(`✨ ${name} cast`);const sp=SPELLS_DB[name];if(sp?.conc){S.conc=name;save();}return;}
  if(S.slots[lv].u>=S.slots[lv].m){toast('No slots available');return}

</div>

  <div class="ctitle" style="color:var(--copper)">⚡ Authority — Free Command</div>
  <div class="c2 ts mb8">Once per Long Rest, cast <em>Command</em> without a spell slot. If delivered as a <strong class="gold">rhyming verse</strong>, affects one additional creature.</div>
  <div class="tc ${S.varaCmd?'muted':'success-c'} ts mb8">${S.varaCmd?'✓ Used — restores on Long Rest':'✦ Available'}</div>
  <button class="btn${S.varaCmd?'':' pri'} full" onclick="useVaraCmd()" ${S.varaCmd?'disabled':''}>${S.varaCmd?'Already Used Today':'⚡ Use Free Command'}</button>
</div>
<div class="card"><div class="ctitle">Staff Effects</div>
  <div class="vara-eff"><div class="vara-eff-name">🔮 ARCANE FOCUS (+1 DC & ATK)</div><div class="vara-eff-desc">Included in Folk's values: DC 16, ATK +8.</div></div>
  <div class="vara-eff"><div class="vara-eff-name">🎭 ELOQUENCE — 1d4 to CHA checks while rhyming</div><div class="vara-eff-desc">Add 1d4 to Persuasion, Deception, Performance, Intimidation checks when speaking in rhyme.</div><div class="btn-row mt8"><button class="btn" style="font-size:10px;padding:5px 12px" onclick="diceRoll(1,4,${skillVal('Persuasion')},'Eloquence: Persuasion + 1d4');showSection('dice')">🎲 Persuasion+d4</button><button class="btn" style="font-size:10px;padding:5px 12px" onclick="diceRoll(1,4,${skillVal('Deception')},'Eloquence: Deception + 1d4');showSection('dice')">🎲 Deception+d4</button></div></div>
  <div class="vara-eff"><div class="vara-eff-name">⚔️ BITE — 1d6 extra damage (verbal rhyme)</div><div class="vara-eff-desc">Once per turn, if a damaging spell uses verbal rhyme as component, add 1d6 extra damage.</div><button class="btn mt8" style="font-size:10px;padding:5px 12px" onclick="diceRoll(1,6,0,'Bite — Extra Damage');showSection('dice')">🎲 Roll 1d6 Bite</button></div>
  <div class="vara-eff"><div class="vara-eff-name">👑 AUTHORITY — Free Command</div><div class="vara-eff-desc">Free Command 1×/long rest. Command as verse: +1 creature.</div></div>
</div>
<div class="card magic"><div class="ctitle" style="color:#b090f0">Lore</div><div class="c2 ts" style="line-height:1.7;font-style:italic">Ten years of slavery in Panelia's northern ruins, with only a harmonica. Escaped using bardic powers. Found shelter with a northern clan whose elder recognized his nature and gifted him this ancient staff — decorated with the clan's colors. Proof Folk is no longer alone.</div></div>`;
}

function conditionsHTML(){
  const allConds=Object.entries(CONDITIONS_DB);
  const spd=effectiveSpeed();
  const{str:autoStr,dex:autoDex}=autoFailSaves();
  return`
<div class="sec-title">💀 Status & Conditions</div>
${condEffectsBoxHTML()}
<div class="card${S.conds.length>0?' danger':''}">
  <div class="ctitle">Active Conditions</div>
  ${S.conds.length===0?'<div class="muted ts tc" style="padding:12px 0">✓ No active conditions</div>':
    S.conds.map(n=>{const c=CONDITIONS_DB[n]||{icon:'❓',color:'#aaa',desc:''};return`<div class="feat-card" style="border-left-color:${c.color};margin-bottom:8px"><div class="row jb"><div class="feat-name" style="color:${c.color}">${c.icon} ${n}</div><button class="btn dan" style="padding:3px 10px;font-size:10px" onclick="toggleCond('${n}')">✕ Remove</button></div><div class="feat-desc">${c.desc}</div></div>`;}).join('')}
</div>
<div class="card" style="${spd<CHAR.baseSpeed?'border-color:'+(spd===0?'var(--danger)':'var(--warn)'):''}">
  <div class="ctitle">Effective Speed</div>
  <div style="text-align:center;padding:10px 0">
    <div class="cinzel" style="font-size:38px;font-weight:700;color:${spd===0?'var(--danger)':spd<CHAR.baseSpeed?'var(--warn)':'var(--success)'}">${spd} ft</div>
    <div class="muted ts">${spd===0?'⛔ Cannot move':spd<CHAR.baseSpeed?`⚠ Reduced from ${CHAR.baseSpeed} ft`:`✓ Full speed`}</div>
  </div>
</div>
${autoStr||autoDex?`<div class="card danger"><div class="ctitle" style="color:var(--danger)">Automatic Save Failures</div>${autoStr?'<div class="feat-card" style="border-left-color:var(--danger)"><div class="feat-name" style="color:var(--danger)">STR Saving Throws — AUTO-FAIL</div></div>':''}${autoDex?'<div class="feat-card" style="border-left-color:var(--danger)"><div class="feat-name" style="color:var(--danger)">DEX Saving Throws — AUTO-FAIL</div></div>':''}</div>`:''}
<div class="card"><div class="ctitle">Exhaustion Level · ${S.exhaustion}/6</div>
  <div class="row" style="gap:12px;align-items:center">
    <button class="ab d" onclick="adjExhaustion(-1)" style="max-width:50px">−</button>
    <div style="flex:1;text-align:center"><div class="cinzel" style="font-size:32px;font-weight:700;color:${S.exhaustion>0?'var(--danger)':'var(--success)'}">${S.exhaustion}</div><div class="muted ts">${EXHAUST_DESC[S.exhaustion]}</div></div>
    <button class="ab" onclick="adjExhaustion(1)" style="max-width:50px;border-color:var(--warn);color:var(--warn)">+</button>
  </div>
</div>
<div class="card"><div class="ctitle">Add / Remove Condition</div>
  <div style="display:flex;flex-wrap:wrap">${allConds.map(([name,c])=>{const on=S.conds.includes(name);return`<span class="cond-chip ${on?'on':'off'}" onclick="toggleCond('${name}')">${c.icon} ${name}${on?' ✕':''}</span>`;}).join('')}</div>
</div>
<div class="card"><div class="ctitle">Conditions Reference</div>
  ${allConds.map(([name,c])=>`<div class="feat-card" style="border-left-color:${c.color}"><div class="feat-name" style="color:${c.color}">${c.icon} ${name}</div><div class="feat-desc">${c.desc}</div>${c.effects.length>0?`<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">${c.effects.map(e=>`<span class="cond-fx-badge ${e.type==='disadv'?'disadv':e.type==='adv'?'adv':e.type==='zero'?'zero':'auto'}">${e.text}</span>`).join('')}</div>`:''}</div>`).join('')}
</div>`;
}

function notesHTML(){
  const tabs=[['session','📓 Session'],['npcs','🧙 NPCs'],['missions','⚔️ Missions'],['panelia','⛓️ Panelia'],['clan','🏕️ Clan']];
  return`
<div class="sec-title">📝 Campaign Notes</div>
<div class="note-tabs">${tabs.map(([k,l])=>`<span class="note-tab${curNoteTab===k?' on':''}" onclick="setNoteTab('${k}')">${l}</span>`).join('')}</div>
<div class="card"><textarea id="note-ta" style="min-height:280px;font-size:15px;line-height:1.7" placeholder="Write your notes here...">${S.notes[curNoteTab]||''}</textarea><button class="btn pri full mt8" onclick="saveNote()">💾 Save Note</button></div>
<div class="card magic"><div class="ctitle" style="color:#b090f0">Folk's Background</div>
  <div class="c2 ts" style="line-height:1.7"><strong class="copper">Origin:</strong> Dandia — itinerant musician.<br><strong class="copper">Arrest:</strong> Unjustly jailed for a ruby theft at a Gremmory event. No trial.<br><strong class="copper">Slavery:</strong> Shipped to Panelia. Ten years in the northern ruins.<br><strong class="copper">Awakening:</strong> Harmonica hypnotized guards. Escaped with verbal Command.<br><strong class="copper">Clan:</strong> Elder recognized bardic nature → shelter + Vara del Juglar.<br><strong class="copper">Character:</strong> Silent · Melancholic · Protective · Hardened · Mentally resilient.</div>
</div>`;
}

function diceHTML(){
  const disadv=hasAttackDisadv();const advAtk=hasAttackAdv();
  const atk20badge=disadv&&!advAtk?`<span class="rb-badge dis">DISADV</span>`:advAtk&&!disadv?`<span class="rb-badge adv">ADV</span>`:'';
  const advBtns=[['normal','Normal',''],['adv','Advantage','suc'],['dis','Disadvantage','dan']];
  return`
<div class="sec-title">🎲 Dice Assistant</div>
<div class="dice-result">${lastDiceHTML()}</div>
${(disadv||advAtk)?`<div class="${disadv&&!advAtk?'disadv-warning':'adv-note'}">${disadv&&!advAtk?'⚠️ Active condition: DISADVANTAGE auto-applied to attack rolls':'✦ Active condition: ADVANTAGE auto-applied to attack rolls'}<br><span style="opacity:.7;font-size:10px">Override manually with the mode buttons below</span></div>`:''}
<div class="card" style="padding:10px"><div class="ctitle">d20 Mode (Override)</div>
  <div class="btn-row">${advBtns.map(([m,l,cl])=>`<button class="btn ${cl} f1${advMode===m?' gld':''}" onclick="setAdvMode('${m}')">${l}</button>`).join('')}</div>
</div>
<div class="card"><div class="ctitle">Attacks & Spells</div>
  <div class="roll-grid">
    <div class="roll-btn" onclick="qRoll(${CHAR.atkBonus},'Spell Attack')">${atk20badge}<span class="rb-name">⚡ Spell Attack</span><span class="rb-dice">1d20 +${CHAR.atkBonus}</span></div>
    <div class="roll-btn" onclick="qRoll(5,'Dancing Sword ATK')">${atk20badge}<span class="rb-name">🌀 Dancing Sword</span><span class="rb-dice">1d20 +5 · 1d6+2 piercing</span></div>
    <div class="roll-btn" onclick="diceRoll(2,4,0,'Vicious Mockery (2d4)')"><span class="rb-name">😈 Vicious Mockery</span><span class="rb-dice">2d4 psychic · DC${CHAR.DC} WIS</span></div>
    <div class="roll-btn" onclick="diceRoll(3,6,0,'Dissonant Whispers (3d6)')"><span class="rb-name">💨 Dissonant Whispers</span><span class="rb-dice">3d6 psychic · DC${CHAR.DC} WIS</span></div>
    <div class="roll-btn" onclick="diceRoll(1,4,4,'Healing Word (1d4+4)')"><span class="rb-name">💚 Healing Word</span><span class="rb-dice">1d4+4 healing</span></div>
    <div class="roll-btn" onclick="diceRoll(1,6,2,'Dancing Sword Damage (1d6+2)')"><span class="rb-name">⚔️ DS Damage</span><span class="rb-dice">1d6+2 piercing</span></div>
    <div class="roll-btn" onclick="diceRoll(1,8,0,'Bardic Inspiration (d8)')"><span class="rb-name">♪ Bardic Inspiration</span><span class="rb-dice">1d8</span></div>
    <div class="roll-btn" onclick="diceRoll(1,6,0,'Bite — Vara Extra Dmg')"><span class="rb-name">⚡ Bite (Vara)</span><span class="rb-dice">1d6 extra (rhyme)</span></div>
    <div class="roll-btn" onclick="diceRoll(1,4,0,'Eloquence (Vara)')"><span class="rb-name">🎭 Eloquence (Vara)</span><span class="rb-dice">1d4 CHA check</span></div>
    <div class="roll-btn" onclick="diceRoll(1,8,2,'Hit Die (1d8+2)')"><span class="rb-name">💊 Hit Die</span><span class="rb-dice">1d8+2 (CON)</span></div>
  </div>
</div>
<div class="card"><div class="ctitle">Saving Throws</div>
  <div class="roll-grid">${Object.entries(CHAR.savingThrows).map(([ab,p])=>{const v=saveVal(ab);const{str,dex}=autoFailSaves();const fail=(ab==='STR'&&str)||(ab==='DEX'&&dex);return`<div class="roll-btn" onclick="qRollFree(${v},'${ab} Save')">${fail?'<span class="rb-badge dis">AUTO-FAIL</span>':''}<span class="rb-name">${p?'★ ':''} ${ab} Save</span><span class="rb-dice">1d20 ${fmtMod(v)}${p?' (prof.)':''}</span></div>`}).join('')}</div>
</div>
<div class="card"><div class="ctitle">Ability Checks</div>
  <div class="roll-grid">${['Deception','Persuasion','Performance','Perception','Stealth','Insight','Athletics','Arcana','Sleight of Hand','Nature'].map(sk=>`<div class="roll-btn" onclick="qRollFree(${skillVal(sk)},'${sk} Check')"><span class="rb-name">${sk}</span><span class="rb-dice">1d20 ${fmtMod(skillVal(sk))}</span></div>`).join('')}</div>
</div>
<div class="card"><div class="ctitle">Basic Dice</div>
  <div class="roll-grid">${[4,6,8,10,12,20].map(d=>`<div class="roll-btn" onclick="diceRoll(1,${d},0,'d${d}')"><span class="rb-name">d${d}</span><span class="rb-dice">1d${d}</span></div>`).join('')}
    <div class="roll-btn" onclick="qRoll(${CHAR.ini},'Initiative')">${atk20badge}<span class="rb-name">⚡ Initiative</span><span class="rb-dice">1d20 +${CHAR.ini}</span></div>
    <div class="roll-btn" onclick="diceRoll(1,100,0,'d100 Percentile')"><span class="rb-name">💯 d100</span><span class="rb-dice">Percentile roll</span></div>
    <div class="roll-btn" onclick="diceRoll(4,6,0,'4d6 — Stat roll')"><span class="rb-name">📊 4d6</span><span class="rb-dice">Generate stat</span></div>
    <div class="roll-btn" onclick="diceRoll(2,20,0,'2d20')"><span class="rb-name">🎲🎲 2d20</span><span class="rb-dice">Manual adv/dis</span></div>
  </div>
</div>
<div class="card"><div class="ctitle">Roll History</div>
  ${S.diceLog.length===0?'<div class="muted ts tc" style="padding:8px">No rolls yet</div>':S.diceLog.slice(0,12).map(r=>`<div class="row jb" style="padding:5px 0;border-bottom:1px solid var(--border);font-size:13px"><span class="c2">${r.label}</span><div class="row" style="gap:8px"><span class="muted txs">${r.bd}</span><strong class="cinzel gold">${r.total}</strong></div></div>`).join('')}
</div>`;
}

// ─── INIT ─────────────────────────────
function init(){
  loadS();
  renderSection('dashboard');
  updateHeaderHP();
  updateCondBanner();
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
