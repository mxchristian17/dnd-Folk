<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Folk · Bard of the College of Valor</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header id="app-header">
  <div id="folk-title">FOLK</div>
  <div class="header-stats">
    <div class="hstat" onclick="showSection('combat')"><span class="hstat-lbl">HP</span><span class="hstat-val" id="hdr-hp">59</span></div>
    <div class="hstat"><span class="hstat-lbl">AC</span><span class="hstat-val">18</span></div>
    <div class="hstat"><span class="hstat-lbl">DC</span><span class="hstat-val">16</span></div>
    <div class="hstat"><span class="hstat-lbl">ATK</span><span class="hstat-val">+8</span></div>
    <div class="hstat" id="hdr-spd-wrap"><span class="hstat-lbl">SPD</span><span class="hstat-val" id="hdr-spd">30ft</span></div>
  </div>
</header>

<div id="cond-banner"><div class="cb-main" id="cb-inner"></div></div>

<div id="secs">
  <div class="section active" id="sec-dashboard"></div>
  <div class="section" id="sec-combat"></div>
  <div class="section" id="sec-spellbook"></div>
  <div class="section" id="sec-bard"></div>
  <div class="section" id="sec-inventory"></div>
  <div class="section" id="sec-vara"></div>
  <div class="section" id="sec-conditions"></div>
  <div class="section" id="sec-notes"></div>
  <div class="section" id="sec-dice"></div>
  <div class="section" id="sec-audio"></div>
</div>

<nav id="bottom-nav">
  <button class="ntab active" data-s="dashboard" onclick="showSection('dashboard')"><span class="ntab-icon">🏠</span><span class="ntab-lbl">Home</span></button>
  <button class="ntab" data-s="combat" onclick="showSection('combat')"><span class="ntab-icon">⚔️</span><span class="ntab-lbl">Combat</span></button>
  <button class="ntab" data-s="spellbook" onclick="showSection('spellbook')"><span class="ntab-icon">📖</span><span class="ntab-lbl">Spells</span></button>
  <button class="ntab" data-s="bard" onclick="showSection('bard')"><span class="ntab-icon">🎵</span><span class="ntab-lbl">Bard</span></button>
  <button class="ntab" data-s="inventory" onclick="showSection('inventory')"><span class="ntab-icon">🎒</span><span class="ntab-lbl">Inv.</span></button>
  <button class="ntab" data-s="vara" onclick="showSection('vara')"><span class="ntab-icon">🪄</span><span class="ntab-lbl">Staff</span></button>
  <button class="ntab" data-s="conditions" onclick="showSection('conditions')"><span class="ntab-icon">💀</span><span class="ntab-lbl">Status</span></button>
  <button class="ntab" data-s="notes" onclick="showSection('notes')"><span class="ntab-icon">📝</span><span class="ntab-lbl">Notes</span></button>
  <button class="ntab" data-s="dice" onclick="showSection('dice')"><span class="ntab-icon">🎲</span><span class="ntab-lbl">Dice</span></button>
  <button class="ntab" data-s="audio" onclick="showSection('audio')"><span class="ntab-icon">🔊</span><span class="ntab-lbl">Audio</span></button>
</nav>

<div id="toast"></div>

<!-- MODALS -->
<div class="overlay" id="m-hp" onclick="if(event.target===this)closeModal('m-hp')">
  <div class="modal"><div class="modal-title">Adjust Hit Points</div>
    <input type="number" id="mi-hp" placeholder="Amount..." style="font-size:22px;text-align:center;margin-bottom:12px">
    <div class="btn-row mb4"><button class="btn dan f1" onclick="applyHP('dmg')">⚔️ Damage</button><button class="btn suc f1" onclick="applyHP('heal')">💚 Heal</button></div>
    <button class="btn full" onclick="closeModal('m-hp')">Cancel</button></div>
</div>
<div class="overlay" id="m-temp" onclick="if(event.target===this)closeModal('m-temp')">
  <div class="modal"><div class="modal-title">Temporary Hit Points</div>
    <input type="number" id="mi-temp" placeholder="Temp HP amount..." style="margin-bottom:12px">
    <div class="btn-row"><button class="btn pri f1" onclick="applyTempHP()">Set</button><button class="btn f1" onclick="closeModal('m-temp')">Cancel</button></div></div>
</div>
<div class="overlay" id="m-conc" onclick="if(event.target===this)closeModal('m-conc')">
  <div class="modal"><div class="modal-title">Concentration</div>
    <input type="text" id="mi-conc" placeholder="Spell name..." style="margin-bottom:12px">
    <div class="btn-row mb8"><button class="btn mag f1" onclick="setConc()">🔵 Concentrate</button><button class="btn dan f1" onclick="breakConc()">✕ Break</button></div>
    <button class="btn full" onclick="closeModal('m-conc')">Cancel</button></div>
</div>
<div class="overlay" id="m-custom-spell" onclick="if(event.target===this)closeModal('m-custom-spell')">
  <div class="modal"><div class="modal-title">Add Custom Spell</div>
    <input id="cs-name" placeholder="Spell name" style="margin-bottom:8px">
    <select id="cs-level" style="margin-bottom:8px"><option value="0">Cantrip</option><option value="1">Level 1</option><option value="2">Level 2</option><option value="3">Level 3</option><option value="4">Level 4</option></select>
    <input id="cs-cast" placeholder="Casting time" style="margin-bottom:8px">
    <input id="cs-range" placeholder="Range (e.g. 60 ft)" style="margin-bottom:8px">
    <input id="cs-dur" placeholder="Duration" style="margin-bottom:8px">
    <textarea id="cs-desc" placeholder="Description..." style="margin-bottom:8px;min-height:80px"></textarea>
    <div class="btn-row"><button class="btn pri f1" onclick="addCustomSpell()">Add</button><button class="btn f1" onclick="closeModal('m-custom-spell')">Cancel</button></div></div>
</div>

<script src="js/config/character.js"></script>
<script src="js/conditions.js"></script>
<script src="js/config/bard-features.js"></script>
<script src="js/config/spells.js"></script>
<script src="js/state.js"></script>
<script src="js/app.js"></script>
<script src="js/sections.js"></script>
<script src="audio/manifest.js"></script>
<script src="js/audio-manager.js"></script>
<script src="js/init.js"></script></body>
</html>
